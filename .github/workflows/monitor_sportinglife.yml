name: Sporting Life Price Monitor

on:
  schedule:
    # Runs daily at 9:00 AM PT (16:00 UTC under PDT / 17:00 UTC under PST)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      send_test_email:
        description: 'Force sending a test email (or trigger test failure) to verify configuration'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    env:
      SMTP_CONFIGURED: ${{ secrets.MAIL_SERVER != '' && secrets.MAIL_USERNAME != '' && secrets.MAIL_PASSWORD != '' && secrets.MAIL_TO != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check Price
        id: check
        run: python check_sportinglife.py

      - name: Send Email Notification
        if: (steps.check.outputs.changed == 'true' || github.event.inputs.send_test_email == 'true') && env.SMTP_CONFIGURED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Sporting Life Price Alert: ${{ (github.event.inputs.send_test_email == 'true' && 'Test Email') || steps.check.outputs.change_summary || 'Price Update' }}"
          to: ${{ secrets.MAIL_TO }}
          from: "Sporting Life Monitor <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <h3>Sporting Life Price/Availability Update</h3>
            <p>A change was detected for the <strong>Specialized Diverge E5 Bike (Size 54)</strong>:</p>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;"/>
            <ul>
              <li><strong>Change details:</strong> ${{ steps.check.outputs.change_summary || 'Manual Test Run (no changes detected)' }}</li>
              <li><strong>Current Price:</strong> $${{ steps.check.outputs.new_price || '1700.00' }} (was $${{ steps.check.outputs.old_price || '1700.00' }})</li>
              <li><strong>Availability:</strong> ${{ steps.check.outputs.new_availability || 'InStock' }} (was ${{ steps.check.outputs.old_availability || 'InStock' }})</li>
            </ul>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;"/>
            <p>Check the product page here: <a href="https://www.sportinglife.ca/en-CA/equipment/cycle/road-bikes/diverge-e5-bike/25930239-00271735.html">Sporting Life - Diverge E5 Bike (Size 54)</a></p>
          secure: ${{ secrets.MAIL_PORT == '465' }}

      - name: Commit and push status_sportinglife.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status_sportinglife.json
          git commit -m "Update Sporting Life bike status: ${{ steps.check.outputs.change_summary }}"
          git push

      - name: Fail intentionally for fallback notification
        if: (steps.check.outputs.changed == 'true' || github.event.inputs.send_test_email == 'true') && env.SMTP_CONFIGURED != 'true'
        run: |
          echo "================================================================================================"
          echo "TEST/ALERT: Changes detected on Sporting Life or test run triggered!"
          echo "Summary: ${{ steps.check.outputs.change_summary || 'Manual Test Run' }}"
          echo "------------------------------------------------------------------------------------------------"
          echo "Since no SMTP secrets (MAIL_SERVER, MAIL_USERNAME, etc.) are configured, we are failing"
          echo "this workflow run intentionally. You should receive a standard GitHub run failure email."
          echo "================================================================================================"
          exit 1
