name: Centurion Project Website Monitor

on:
  schedule:
    # Runs daily at 5:00 AM UTC (which is 11:00 PM MDT / 10:00 PM MST)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      send_test_email:
        description: 'Force sending a test email (or trigger test failure) to verify configuration'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    env:
      SMTP_CONFIGURED: ${{ secrets.MAIL_SERVER != '' && secrets.MAIL_USERNAME != '' && secrets.MAIL_PASSWORD != '' && secrets.MAIL_TO != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check Content
        id: check
        run: python check_centurion.py

      - name: Send Email Notification
        if: (steps.check.outputs.changed == 'true' || github.event.inputs.send_test_email == 'true') && env.SMTP_CONFIGURED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Centurion Project Alert: ${{ (github.event.inputs.send_test_email == 'true' && 'Test Email') || steps.check.outputs.change_summary || 'Website Content Updated' }}"
          to: ${{ secrets.MAIL_TO }}
          from: "Centurion Project Monitor <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <h3>Centurion Project Website Change Detected</h3>
            <p>The following changes were detected on The Centurion Project website:</p>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;"/>
            <div>
              ${{ steps.check.outputs.change_details || '<h3>Test Email</h3><p>This is a manual test email to verify your SMTP configuration. No actual changes were detected.</p>' }}
            </div>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;"/>
            <p>Visit the live sites here:</p>
            <ul>
              <li><a href="https://www.thecenturionproject.ca/">Home Page</a></li>
              <li><a href="https://www.thecenturionproject.ca/event-list">Events Page</a></li>
            </ul>
          secure: ${{ secrets.MAIL_PORT == '465' }}

      - name: Commit and push status_centurion.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status_centurion.json
          git commit -m "Update Centurion Project baseline: ${{ steps.check.outputs.change_summary }}"
          git push

      - name: Fail intentionally for fallback notification
        if: (steps.check.outputs.changed == 'true' || github.event.inputs.send_test_email == 'true') && env.SMTP_CONFIGURED != 'true'
        run: |
          echo "================================================================================================"
          echo "TEST/ALERT: Changes detected on Centurion Project or test run triggered!"
          echo "Summary: ${{ steps.check.outputs.change_summary || 'Manual Test Run' }}"
          echo "------------------------------------------------------------------------------------------------"
          echo "Since no SMTP secrets (MAIL_SERVER, MAIL_USERNAME, etc.) are configured, we are failing"
          echo "this workflow run intentionally. You should receive a standard GitHub run failure email."
          echo "================================================================================================"
          exit 1
